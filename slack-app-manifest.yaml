display_information:
  name: Claude Code Bot
  description: Claude Code agent in Slack — persistent sessions per thread
  background_color: "#4A154B"
  long_description: A Slack bot that gives Claude Code a persistent, multi-threaded home in your workspace. Each thread becomes a resumable session with full tool access, MCP servers, and working directory context. Supports image uploads, streaming responses, and file analysis.
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  assistant_view:
    assistant_description: Claude Code agent — persistent sessions per thread with full tool access
    suggested_prompts: []
  bot_user:
    display_name: Claude Code
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - channels:history
      - chat:write
      - chat:write.public
      - files:write
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:read
      - reactions:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - member_joined_channel
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false